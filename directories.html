<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browse game.mrzsomi.top deployment directories and files.">
<meta name="theme-color" content="#0b1020">
<title>Directory browser | game.mrzsomi.top</title>

<style>
:root {
    color-scheme: dark;
    --background: #0b1020;
    --surface: rgba(19, 27, 47, 0.9);
    --surface-raised: rgba(31, 43, 72, 0.58);
    --surface-hover: rgba(124, 156, 255, 0.1);
    --border: rgba(157, 181, 227, 0.16);
    --border-strong: rgba(157, 181, 227, 0.28);
    --text: #f3f7ff;
    --text-secondary: #aab7d0;
    --text-muted: #7886a1;
    --primary: #91aaff;
    --success: #46d49b;
    --danger: #ff8f9b;
    --shadow: 0 28px 80px rgba(0, 0, 0, 0.35);
    --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
        "Segoe UI", sans-serif;
    --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
}

* {
    box-sizing: border-box;
}

.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
}

html {
    min-width: 320px;
    background: var(--background);
}

body {
    min-height: 100vh;
    margin: 0;
    background:
        radial-gradient(circle at 8% 5%, rgba(92, 111, 226, 0.2), transparent 29rem),
        radial-gradient(circle at 96% 95%, rgba(38, 168, 151, 0.13), transparent 27rem),
        var(--background);
    color: var(--text);
    font-family: var(--font);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
}

.page-shell {
    width: min(100%, 1120px);
    margin: 0 auto;
    padding: 40px 24px;
}

.back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-secondary);
    font-size: 0.875rem;
    font-weight: 600;
    text-decoration: none;
}

.back-link:hover {
    color: var(--text);
}

.back-link:focus-visible,
.entry:focus-visible,
.breadcrumb-link:focus-visible,
.footer-link:focus-visible {
    outline: 3px solid rgba(155, 178, 255, 0.65);
    outline-offset: 3px;
}

.back-link svg,
.entry-arrow {
    width: 16px;
    height: 16px;
}

.browser-card {
    margin-top: 24px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(18px);
}

.browser-header {
    padding: 42px 48px 32px;
    border-bottom: 1px solid var(--border);
}

.eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #b9c8ff;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    line-height: 1;
    text-transform: uppercase;
}

.eyebrow::before {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
    content: "";
}

h1,
p {
    margin: 0;
}

h1 {
    margin-top: 18px;
    font-size: clamp(2rem, 5vw, 2.75rem);
    font-weight: 700;
    letter-spacing: -0.045em;
    line-height: 1.05;
}

.description {
    max-width: 62ch;
    margin-top: 14px;
    color: var(--text-secondary);
    font-size: 0.98rem;
    line-height: 1.65;
}

.toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-top: 30px;
}

.breadcrumb {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 7px;
    min-width: 0;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.8rem;
}

.breadcrumb-link {
    color: var(--text-secondary);
    text-decoration: none;
}

.breadcrumb-link:hover {
    color: var(--text);
}

.breadcrumb-current {
    overflow: hidden;
    color: var(--text);
    text-overflow: ellipsis;
    white-space: nowrap;
}

.breadcrumb-separator {
    color: var(--text-muted);
}

.search {
    position: relative;
    flex: 0 1 260px;
}

.search svg {
    position: absolute;
    top: 50%;
    left: 12px;
    width: 16px;
    height: 16px;
    color: var(--text-muted);
    pointer-events: none;
    transform: translateY(-50%);
}

.search input {
    width: 100%;
    min-height: 40px;
    padding: 9px 12px 9px 36px;
    border: 1px solid var(--border);
    border-radius: 9px;
    outline: none;
    background: rgba(255, 255, 255, 0.035);
    color: var(--text);
    font: inherit;
    font-size: 0.85rem;
}

.search input::placeholder {
    color: var(--text-muted);
}

.search input:focus {
    border-color: rgba(145, 170, 255, 0.65);
    box-shadow: 0 0 0 3px rgba(145, 170, 255, 0.14);
}

.browser-body {
    padding: 24px 48px 32px;
}

.directory-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 24px;
    margin-bottom: 12px;
    color: var(--text-muted);
    font-size: 0.8rem;
}

.source-status {
    display: inline-flex;
    align-items: center;
    gap: 7px;
}

.source-status::before {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 3px rgba(70, 212, 155, 0.12);
    content: "";
}

.source-status.fallback::before {
    background: #f0b861;
    box-shadow: 0 0 0 3px rgba(240, 184, 97, 0.12);
}

.explorer {
    overflow: hidden;
    border: 1px solid var(--border);
    border-radius: 14px;
}

.explorer-header,
.entry {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 130px 24px;
    gap: 20px;
    align-items: center;
}

.explorer-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.025);
    color: var(--text-muted);
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

.entry-list {
    min-height: 92px;
}

.entry {
    width: 100%;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font: inherit;
    text-align: left;
    text-decoration: none;
    transition: background-color 160ms ease;
}

.entry:last-child {
    border-bottom: 0;
}

.entry:hover {
    background: var(--surface-hover);
}

.entry-name {
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
}

.entry-icon {
    flex: 0 0 auto;
    width: 20px;
    height: 20px;
}

.entry-icon.folder {
    color: var(--primary);
}

.entry-icon.file {
    color: var(--text-muted);
}

.entry-title {
    overflow: hidden;
    font-size: 0.9rem;
    font-weight: 600;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.entry-path {
    margin-top: 3px;
    overflow: hidden;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.72rem;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.entry-type {
    color: var(--text-secondary);
    font-size: 0.78rem;
}

.entry-arrow {
    color: var(--text-muted);
}

.empty-state,
.loading-state,
.error-state {
    display: grid;
    place-items: center;
    min-height: 154px;
    padding: 28px;
    color: var(--text-secondary);
    font-size: 0.9rem;
    text-align: center;
}

.error-state {
    color: var(--danger);
}

.footer {
    display: flex;
    justify-content: space-between;
    gap: 20px;
    padding: 20px 4px 0;
    color: var(--text-muted);
    font-size: 0.75rem;
}

.footer-link {
    color: var(--text-secondary);
    text-decoration: none;
}

.footer-link:hover {
    color: var(--text);
}

@media (max-width: 700px) {
    .page-shell {
        padding: 20px 16px;
    }

    .browser-card {
        border-radius: 18px;
    }

    .browser-header,
    .browser-body {
        padding-right: 24px;
        padding-left: 24px;
    }

    .browser-header {
        padding-top: 32px;
    }

    .toolbar {
        align-items: stretch;
        flex-direction: column;
    }

    .search {
        flex-basis: auto;
    }

    .explorer-header,
    .entry {
        grid-template-columns: minmax(0, 1fr) 20px;
        gap: 12px;
    }

    .explorer-header span:nth-child(2),
    .entry-type {
        display: none;
    }

    .entry {
        padding: 14px;
    }

    .footer {
        align-items: flex-start;
        flex-direction: column;
    }
}

@media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
    }
}
</style>
</head>
<body>
<main class="page-shell">
    <a class="back-link" href="index.html">
        <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M13 8H3m4-4L3 8l4 4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
        </svg>
        Back to infrastructure overview
    </a>

    <section class="browser-card" aria-labelledby="page-title">
        <header class="browser-header">
            <span class="eyebrow">Asset browser</span>
            <h1 id="page-title">Deployment directories</h1>
            <p class="description">
                Browse the files and directories published with this game services deployment.
            </p>

            <div class="toolbar">
                <nav class="breadcrumb" aria-label="Directory path" id="breadcrumb"></nav>
                <label class="search">
                    <span class="sr-only">Filter this directory</span>
                    <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                        <circle cx="7" cy="7" r="4.25" stroke="currentColor" stroke-width="1.5"/>
                        <path d="m10.25 10.25 3 3" stroke="currentColor" stroke-linecap="round" stroke-width="1.5"/>
                    </svg>
                    <input id="filter-input" type="search" placeholder="Filter this directory" autocomplete="off">
                </label>
            </div>
        </header>

        <div class="browser-body">
            <div class="directory-meta">
                <span id="entry-count">Loading index...</span>
                <span class="source-status" id="source-status">Loading source</span>
            </div>

            <div class="explorer">
                <div class="explorer-header" aria-hidden="true">
                    <span>Name</span>
                    <span>Type</span>
                    <span></span>
                </div>
                <div class="entry-list" id="entry-list" aria-live="polite">
                    <p class="loading-state">Loading deployment index...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <span>&copy; 2026 MrZsomi</span>
        <a class="footer-link" href="https://mrzsomi.top">Main website</a>
    </footer>
</main>

<script>
const REPOSITORY = "SajtosZsomle/game-web";
const BRANCH = "main";
const STORAGE_ROOT = "storage";
const CONTENTS_URL = `https://api.github.com/repos/${REPOSITORY}/contents`;
const MANIFEST_URL = "manifest.json";
const CACHE_KEY = "game-web-directory-index-v3";
const CACHE_TTL = 5 * 60 * 1000;

const breadcrumbEl = document.getElementById("breadcrumb");
const entryCountEl = document.getElementById("entry-count");
const entryListEl = document.getElementById("entry-list");
const filterInput = document.getElementById("filter-input");
const sourceStatusEl = document.getElementById("source-status");

let directoryCache = new Map();

function createSvg(className, pathData) {
    const namespace = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(namespace, "svg");
    const path = document.createElementNS(namespace, "path");

    svg.setAttribute("class", className);
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("fill", "none");
    svg.setAttribute("aria-hidden", "true");
    path.setAttribute("d", pathData);
    path.setAttribute("stroke", "currentColor");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("stroke-linejoin", "round");
    path.setAttribute("stroke-width", "1.75");
    svg.appendChild(path);
    return svg;
}

function isVisiblePath(path) {
    return path.split("/").every((segment) => !segment.startsWith("."));
}

function getCurrentPath() {
    try {
        return decodeURIComponent(window.location.hash.slice(1))
            .replace(/^\/+|\/+$/g, "");
    } catch {
        return "";
    }
}

function encodePath(path) {
    return path.split("/").map(encodeURIComponent).join("/");
}

function getParentPath(path) {
    return path.includes("/") ? path.slice(0, path.lastIndexOf("/")) : "";
}

function getEntryPath(entry) {
    return entry.path.replace(/\/$/, "");
}

function getPublicAssetPath(path) {
    return `${STORAGE_ROOT}/${path}`;
}

function getDirectoryEntries(path) {
    return (directoryCache.get(path) || [])
        .sort((left, right) => {
            if (left.type !== right.type) {
                return left.type === "tree" ? -1 : 1;
            }

            return left.path.localeCompare(right.path, undefined, { numeric: true });
        });
}

function setSourceStatus(label, isFallback) {
    sourceStatusEl.textContent = label;
    sourceStatusEl.classList.toggle("fallback", isFallback);
}

function renderBreadcrumb(path) {
    breadcrumbEl.replaceChildren();

    const rootLink = document.createElement("a");
    rootLink.className = "breadcrumb-link";
    rootLink.href = "#";
    rootLink.textContent = "root";
    breadcrumbEl.appendChild(rootLink);

    let accumulatedPath = "";
    for (const segment of path.split("/").filter(Boolean)) {
        accumulatedPath = accumulatedPath ? `${accumulatedPath}/${segment}` : segment;

        const separator = document.createElement("span");
        separator.className = "breadcrumb-separator";
        separator.textContent = "/";
        breadcrumbEl.appendChild(separator);

        const isCurrent = accumulatedPath === path;
        if (isCurrent) {
            const current = document.createElement("span");
            current.className = "breadcrumb-current";
            current.textContent = segment;
            breadcrumbEl.appendChild(current);
            continue;
        }

        const link = document.createElement("a");
        link.className = "breadcrumb-link";
        link.href = `#${encodePath(accumulatedPath)}`;
        link.textContent = segment;
        breadcrumbEl.appendChild(link);
    }
}

function renderEntry(entry) {
    const isDirectory = entry.type === "tree";
    const path = getEntryPath(entry);
    const row = document.createElement("a");

    row.className = "entry";
    row.href = isDirectory
        ? `#${encodePath(path)}`
        : encodePath(getPublicAssetPath(path));
    row.title = path;

    const name = document.createElement("span");
    name.className = "entry-name";
    name.appendChild(createSvg(
        `entry-icon ${isDirectory ? "folder" : "file"}`,
        isDirectory
            ? "M3 6.75A1.75 1.75 0 0 1 4.75 5h4l1.5 2h9A1.75 1.75 0 0 1 21 8.75v8.5A1.75 1.75 0 0 1 19.25 19h-14.5A1.75 1.75 0 0 1 3 17.25v-10.5Z"
            : "M6.5 3h7l4 4v12.25A1.75 1.75 0 0 1 15.75 21h-9A1.75 1.75 0 0 1 5 19.25v-14.5A1.75 1.75 0 0 1 6.75 3H6.5Zm6.5 0v4h4"
    ));

    const titleGroup = document.createElement("span");
    const title = document.createElement("span");
    const entryPath = document.createElement("span");
    title.className = "entry-title";
    entryPath.className = "entry-path";
    title.textContent = path.slice(path.lastIndexOf("/") + 1);
    entryPath.textContent = isDirectory ? `${path}/` : path;
    titleGroup.append(title, entryPath);
    name.appendChild(titleGroup);

    const type = document.createElement("span");
    type.className = "entry-type";
    type.textContent = isDirectory ? "Directory" : "File";

    row.append(name, type, createSvg(
        "entry-arrow",
        isDirectory ? "M5 12h14m-6-6 6 6-6 6" : "M5 12h14m-6-6 6 6-6 6"
    ));
    return row;
}

function renderDirectory() {
    const path = getCurrentPath();
    const filter = filterInput.value.trim().toLocaleLowerCase();
    const allDirectoryEntries = getDirectoryEntries(path);
    const visibleEntries = allDirectoryEntries.filter((entry) =>
        entry.path.toLocaleLowerCase().includes(filter)
    );

    renderBreadcrumb(path);
    entryListEl.replaceChildren();

    const directoryName = path || "root";
    entryCountEl.textContent = filter
        ? `${visibleEntries.length} of ${allDirectoryEntries.length} items in ${directoryName}`
        : `${allDirectoryEntries.length} ${allDirectoryEntries.length === 1 ? "item" : "items"} in ${directoryName}`;

    if (visibleEntries.length === 0) {
        const message = document.createElement("p");
        message.className = "empty-state";
        message.textContent = filter
            ? "No items match this filter."
            : "This directory is empty.";
        entryListEl.appendChild(message);
        return;
    }

    const fragment = document.createDocumentFragment();
    visibleEntries.forEach((entry) => fragment.appendChild(renderEntry(entry)));
    entryListEl.appendChild(fragment);
}

function readCachedIndex() {
    try {
        const cached = JSON.parse(sessionStorage.getItem(CACHE_KEY));
        if (
            cached &&
            cached.directories &&
            Date.now() - cached.timestamp < CACHE_TTL
        ) {
            directoryCache = new Map(Object.entries(cached.directories));
            return true;
        }
    } catch {
        sessionStorage.removeItem(CACHE_KEY);
    }

    return false;
}

function cacheIndex() {
    try {
        sessionStorage.setItem(CACHE_KEY, JSON.stringify({
            directories: Object.fromEntries(directoryCache),
            timestamp: Date.now()
        }));
    } catch {
        // Browsing remains available when storage is disabled or full.
    }
}

async function fetchDirectory(path) {
    if (directoryCache.has(path)) {
        return directoryCache.get(path);
    }

    const publicPath = path ? `${STORAGE_ROOT}/${path}` : STORAGE_ROOT;
    const response = await fetch(
        `${CONTENTS_URL}/${encodePath(publicPath)}?ref=${encodeURIComponent(BRANCH)}`,
        { headers: { Accept: "application/vnd.github+json" } }
    );

    if (!response.ok) {
        throw new Error(`storage directory returned ${response.status}`);
    }

    const data = await response.json();
    if (!Array.isArray(data)) {
        throw new Error("storage path is not a directory");
    }

    const directoryEntries = data
        .filter((entry) =>
            (entry.type === "dir" || entry.type === "file") &&
            typeof entry.name === "string" &&
            isVisiblePath(entry.name)
        )
        .map((entry) => ({
            path: path ? `${path}/${entry.name}` : entry.name,
            type: entry.type === "dir" ? "tree" : "blob"
        }));

    directoryCache.set(path, directoryEntries);
    cacheIndex();
    return directoryEntries;
}

async function ensureDirectory(path) {
    await fetchDirectory("");

    let parentPath = "";
    for (const segment of path.split("/").filter(Boolean)) {
        const currentPath = parentPath ? `${parentPath}/${segment}` : segment;
        const directoryExists = getDirectoryEntries(parentPath).some((entry) =>
            entry.type === "tree" && getEntryPath(entry) === currentPath
        );

        if (!directoryExists) {
            return false;
        }

        await fetchDirectory(currentPath);
        parentPath = currentPath;
    }

    return true;
}

async function loadFallbackIndex() {
    const response = await fetch(MANIFEST_URL, { cache: "no-store" });
    if (!response.ok) {
        throw new Error(`manifest.json returned ${response.status}`);
    }

    const manifest = await response.json();
    if (!Array.isArray(manifest.directories)) {
        throw new Error("manifest.json does not contain a directories array");
    }

    return manifest.directories
        .filter((directory) =>
            typeof directory.path === "string" &&
            directory.path.startsWith(`${STORAGE_ROOT}/`)
        )
        .map((directory) => ({
            path: directory.path
                .slice(STORAGE_ROOT.length + 1)
                .replace(/\/+$/, ""),
            type: "tree"
        }));
}

async function loadIndex() {
    try {
        const restoredFromCache = readCachedIndex();
        const directoryExists = await ensureDirectory(getCurrentPath());
        if (!directoryExists) {
            window.location.hash = "";
            return;
        }

        setSourceStatus(
            restoredFromCache ? "Cached storage index" : "Live storage index",
            false
        );
    } catch {
        try {
            directoryCache = new Map([["", await loadFallbackIndex()]]);
            setSourceStatus("Fallback directory index", true);

            if (getCurrentPath()) {
                window.location.hash = "";
                return;
            }
        } catch {
            entryCountEl.textContent = "Index unavailable";
            sourceStatusEl.textContent = "Unable to load source";
            sourceStatusEl.classList.add("fallback");
            entryListEl.replaceChildren();
            const message = document.createElement("p");
            message.className = "error-state";
            message.textContent = "The directory index could not be loaded. Please try again later.";
            entryListEl.appendChild(message);
            return;
        }
    }

    renderDirectory();
}

filterInput.addEventListener("input", renderDirectory);
window.addEventListener("hashchange", () => {
    filterInput.value = "";
    loadIndex();
});

loadIndex();
</script>
</body>
</html>
