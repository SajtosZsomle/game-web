<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MrZsomi.top: Directory Browser</title>

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --row-hover: #1c2129;
            --border: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-muted: #484f58;
            --accent: #1f6feb;
            --accent-hover: #58a6ff;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            --radius: 12px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-primary);
            font-family: var(--font);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 48px 24px;
            -webkit-font-smoothing: antialiased;
        }

        .portal-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            max-width: 1100px;
            width: 100%;
            padding: 48px 56px 40px;
        }

        .badge {
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(31, 111, 235, 0.12);
            padding: 6px 14px;
            border-radius: 999px;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 32px;
            font-weight: 650;
            letter-spacing: -0.02em;
            margin-bottom: 12px;
        }

        .description {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 24px;
        }

        .back-link:hover {
            color: var(--text-primary);
        }

        .explorer {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .explorer-header {
            display: flex;
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid var(--border);
        }

        .col-name {
            flex: 1;
        }

        .col-desc {
            flex: 2;
        }

        .dir-row {
            display: flex;
            align-items: center;
            padding: 22px 24px;
            text-decoration: none;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            transition: background 0.12s ease;
        }

        .dir-row:last-child {
            border-bottom: none;
        }

        .dir-row:hover {
            background: var(--row-hover);
        }

        .dir-icon {
            flex-shrink: 0;
            width: 28px;
            height: 28px;
            margin-right: 18px;
            color: var(--accent-hover);
        }

        .col-name {
            display: flex;
            align-items: center;
            font-size: 18px;
            font-weight: 600;
            min-width: 0;
        }

        .dir-name-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .col-desc {
            font-size: 15px;
            color: var(--text-secondary);
            min-width: 0;
        }

        .arrow {
            flex-shrink: 0;
            margin-left: 18px;
            color: var(--text-muted);
            font-size: 18px;
        }

        .state-message {
            padding: 40px 20px;
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
        }

        .state-message.error {
            color: #f85149;
        }

        .footer-copy {
            margin-top: 28px;
            font-size: 13px;
            color: var(--text-muted);
        }

        @media (max-width: 700px) {
            body {
                padding: 24px 12px;
            }

            .portal-card {
                padding: 32px 20px 28px;
            }

            h1 {
                font-size: 26px;
            }

            .col-desc {
                display: none;
            }

            .col-name {
                font-size: 16px;
            }

            .dir-row {
                padding: 18px 16px;
            }
        }
    </style>
</head>

<body>

<div class="portal-card" role="main">

    <a href="index.html" class="back-link">
        &larr; Back to landing page
    </a>

    <span class="badge">Directory Browser</span>

    <h1>Available directories</h1>

    <p class="description">
        Current directories that store game-related files and assets:
    </p>

    <div class="explorer">

        <div class="explorer-header">
            <span class="col-name">Name</span>
            <span class="col-desc">Description</span>
        </div>

        <div id="dir-list">
            <div class="state-message" id="state-message">
                Loading directories&hellip;
            </div>
        </div>

    </div>

    <p class="footer-copy">
        &copy; 2026 MrZsomi. All rights reserved.
    </p>

</div>


<script>
async function loadDirectories() {

    const listEl = document.getElementById("dir-list");
    const stateEl = document.getElementById("state-message");

    try {

        const response = await fetch("manifest.json", {
            cache: "no-store"
        });

        if (!response.ok) {
            throw new Error("manifest.json returned " + response.status);
        }

        const data = await response.json();

        const directories =
            Array.isArray(data.directories)
                ? data.directories
                : [];

        if (directories.length === 0) {
            stateEl.textContent = "No directories found.";
            return;
        }

        stateEl.remove();

        const fragment = document.createDocumentFragment();

        directories.forEach((dir) => {

            const row = document.createElement("a");

            row.className = "dir-row";
            row.href = dir.path || (dir.name + "/");


            const nameCol = document.createElement("span");
            nameCol.className = "col-name";


            const icon = document.createElementNS(
                "http://www.w3.org/2000/svg",
                "svg"
            );

            icon.setAttribute("class", "dir-icon");
            icon.setAttribute("viewBox", "0 0 24 24");
            icon.setAttribute("fill", "currentColor");

            icon.innerHTML =
                '<path d="M10 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-8l-2-2z"/>';


            const nameText = document.createElement("span");

            nameText.className = "dir-name-text";
            nameText.textContent = dir.label || dir.name;


            nameCol.appendChild(icon);
            nameCol.appendChild(nameText);


            const descCol = document.createElement("span");

            descCol.className = "col-desc";
            descCol.textContent = dir.description || "";


            const arrow = document.createElement("span");

            arrow.className = "arrow";
            arrow.textContent = "→";


            row.appendChild(nameCol);
            row.appendChild(descCol);
            row.appendChild(arrow);


            fragment.appendChild(row);

        });


        listEl.appendChild(fragment);


    } catch (err) {

        stateEl.textContent =
            "Couldn't load manifest.json: " + err.message;

        stateEl.classList.add("error");

    }
}


loadDirectories();
</script>


</body>
</html>
